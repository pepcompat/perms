appId: com.perms.aiterminal
productName: AI Terminal
directories:
  buildResources: build
  output: release
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml,package-lock.json}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
  - '**/node_modules/better-sqlite3/**'
  - '**/node_modules/node-pty/**'
  - '**/node_modules/ssh2/**'
afterSign: build/notarize.cjs
mac:
  category: public.app-category.developer-tools
  target:
    - dmg
    - zip
  artifactName: ${productName}-${version}-${arch}.${ext}
  # เซ็นแบบ hardened runtime (จำเป็นสำหรับ notarization)
  # ใช้ default entitlements ของ electron-builder (รองรับ Electron อยู่แล้ว)
  hardenedRuntime: true
  gatekeeperAssess: false
win:
  target:
    - nsis
  artifactName: ${productName}-${version}-setup.${ext}
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
linux:
  target:
    - AppImage
    - deb
  category: Development
  artifactName: ${productName}-${version}.${ext}
npmRebuild: false
# เผยแพร่ release ไปยัง repo public (source อยู่ repo private คนละตัว)
publish:
  provider: github
  owner: pepcompat
  repo: perms-desktop
  releaseType: release
