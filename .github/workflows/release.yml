name: Release

# trigger เมื่อ push tag แบบ v1.0.1 (หรือสั่งรันเองจากหน้า Actions)
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # Python 3.11 ยังมี distutils ที่ node-gyp ต้องใช้ build native modules
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Ensure setuptools (distutils shim)
        run: python -m pip install --upgrade setuptools

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm run typecheck

      - name: Build & publish
        env:
          # PAT ที่มีสิทธิ์ contents:write ของ repo perms-desktop
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          # ไม่เซ็น code บน macOS (ยังไม่มี certificate)
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: pnpm run release
